site_name: kayak
site_description: Late-interaction retrieval for Python with an explicit Mojo exact CPU backend
site_url: https://docs.withkayak.com

theme:
  name: material
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: black
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: black
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  font:
    text: Inter
    code: JetBrains Mono
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.expand
    - navigation.footer
    - navigation.top
    - navigation.tracking
    - search.suggest
    - search.highlight
    - content.code.copy
    - content.code.annotate
    - content.tabs.link
    - toc.follow

nav:
  - Home: index.md
  - Get Started:
    - Installation: installation.md
    - Quickstart: quickstart.md
    - Text Encoders: text-encoders.md
    - Usage Patterns: usage-patterns.md
    - Examples: examples.md
  - Integrations:
    - Storage + Search: storage-and-search.md
    - Vector Databases: vector-databases.md
    - Using the Mojo Backend: mojo-backend.md
    - Hosted Engine Python: hosted-engine-python.md
  - Concepts:
    - Late Interaction: concepts.md
    - Search Plans: search-plans.md
  - Reference:
    - API Reference: api.md

extra_css:
  - stylesheets/extra.css

markdown_extensions:
  - md_in_html
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - admonition
  - pymdownx.details
  - attr_list
  - def_list
  - tables
