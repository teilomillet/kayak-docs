site_name: Kayak
site_description: Late-interaction retrieval docs for the Kayak Python SDK
site_url: https://docs.withkayak.com

theme:
  name: material
  font: false
  custom_dir: overrides

nav:
  - Home: index.md
  - Start Here: start-here.md
  - Installation: installation.md
  - Quickstart: quickstart.md
  - Usage Patterns: usage-patterns.md
  - Text Encoders: text-encoders.md
  - Storage + Search: storage-and-search.md
  - Vector Databases: vector-databases.md
  - Search Plans: search-plans.md
  - Concepts: concepts.md
  - Python API: api.md
  - Examples: examples.md

extra_css:
  - stylesheets/extra.css

extra:
  generator: false

markdown_extensions:
  - md_in_html
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - attr_list
  - tables
