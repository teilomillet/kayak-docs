<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="620" viewBox="0 0 1200 620" fill="none">
  <rect width="1200" height="620" rx="28" fill="#F8FAFC"/>
  <rect x="30" y="30" width="1140" height="560" rx="24" fill="url(#bg)" stroke="#D7E2EA"/>

  <text x="70" y="95" fill="#0F172A" font-family="Inter, Arial, sans-serif" font-size="34" font-weight="700">Kayak public Python flow</text>
  <text x="70" y="126" fill="#475569" font-family="Inter, Arial, sans-serif" font-size="18">Choose the path that matches what you already have. Kayak keeps the retrieval step explicit.</text>

  <rect x="70" y="180" width="270" height="130" rx="20" fill="#FFFFFF" stroke="#D7E2EA"/>
  <text x="95" y="222" fill="#14B8A6" font-family="Inter, Arial, sans-serif" font-size="14" font-weight="700">PATH A</text>
  <text x="95" y="254" fill="#0F172A" font-family="Inter, Arial, sans-serif" font-size="28" font-weight="700">Start from text</text>
  <text x="95" y="286" fill="#475569" font-family="Inter, Arial, sans-serif" font-size="18">Open one encoder or one</text>
  <text x="95" y="310" fill="#475569" font-family="Inter, Arial, sans-serif" font-size="18">retriever and ingest text.</text>

  <rect x="70" y="360" width="270" height="130" rx="20" fill="#FFFFFF" stroke="#D7E2EA"/>
  <text x="95" y="402" fill="#14B8A6" font-family="Inter, Arial, sans-serif" font-size="14" font-weight="700">PATH B</text>
  <text x="95" y="434" fill="#0F172A" font-family="Inter, Arial, sans-serif" font-size="28" font-weight="700">Start from vectors</text>
  <text x="95" y="466" fill="#475569" font-family="Inter, Arial, sans-serif" font-size="18">Build one query and one</text>
  <text x="95" y="490" fill="#475569" font-family="Inter, Arial, sans-serif" font-size="18">packed index directly.</text>

  <rect x="420" y="180" width="320" height="310" rx="22" fill="#FFFFFF" stroke="#D7E2EA"/>
  <text x="448" y="225" fill="#0F172A" font-family="Inter, Arial, sans-serif" font-size="30" font-weight="700">Kayak exact search</text>
  <text x="448" y="262" fill="#475569" font-family="Inter, Arial, sans-serif" font-size="18">Search stays explicit:</text>
  <text x="448" y="296" fill="#0F172A" font-family="Inter, Arial, sans-serif" font-size="18">• backend choice</text>
  <text x="448" y="326" fill="#0F172A" font-family="Inter, Arial, sans-serif" font-size="18">• vector counts</text>
  <text x="448" y="356" fill="#0F172A" font-family="Inter, Arial, sans-serif" font-size="18">• loaded exact slice reuse</text>
  <text x="448" y="386" fill="#0F172A" font-family="Inter, Arial, sans-serif" font-size="18">• batch search on one index</text>
  <rect x="448" y="420" width="190" height="38" rx="19" fill="#CCFBF1"/>
  <text x="470" y="445" fill="#115E59" font-family="Inter, Arial, sans-serif" font-size="16" font-weight="700">MOJO_EXACT_CPU_BACKEND</text>

  <rect x="820" y="110" width="300" height="140" rx="20" fill="#FFFFFF" stroke="#D7E2EA"/>
  <text x="848" y="152" fill="#14B8A6" font-family="Inter, Arial, sans-serif" font-size="14" font-weight="700">OPTIONAL</text>
  <text x="848" y="184" fill="#0F172A" font-family="Inter, Arial, sans-serif" font-size="28" font-weight="700">Keep your vector DB</text>
  <text x="848" y="216" fill="#475569" font-family="Inter, Arial, sans-serif" font-size="18">LanceDB, PgVector, Qdrant,</text>
  <text x="848" y="240" fill="#475569" font-family="Inter, Arial, sans-serif" font-size="18">Weaviate, or Chroma for storage.</text>

  <rect x="820" y="290" width="300" height="200" rx="20" fill="#FFFFFF" stroke="#D7E2EA"/>
  <text x="848" y="332" fill="#14B8A6" font-family="Inter, Arial, sans-serif" font-size="14" font-weight="700">FAST PATH</text>
  <text x="848" y="364" fill="#0F172A" font-family="Inter, Arial, sans-serif" font-size="28" font-weight="700">Load once, reuse</text>
  <text x="848" y="396" fill="#475569" font-family="Inter, Arial, sans-serif" font-size="18">If the slice stays fixed:</text>
  <text x="848" y="428" fill="#0F172A" font-family="Inter, Arial, sans-serif" font-size="18">1. load_index(...)</text>
  <text x="848" y="456" fill="#0F172A" font-family="Inter, Arial, sans-serif" font-size="18">2. keep the LateIndex in memory</text>
  <text x="848" y="484" fill="#0F172A" font-family="Inter, Arial, sans-serif" font-size="18">3. use search_batch(...)</text>

  <path d="M340 245H392" stroke="#14B8A6" stroke-width="6" stroke-linecap="round"/>
  <path d="M380 229L412 245L380 261" fill="none" stroke="#14B8A6" stroke-width="6" stroke-linecap="round" stroke-linejoin="round"/>

  <path d="M340 425H392" stroke="#14B8A6" stroke-width="6" stroke-linecap="round"/>
  <path d="M380 409L412 425L380 441" fill="none" stroke="#14B8A6" stroke-width="6" stroke-linecap="round" stroke-linejoin="round"/>

  <path d="M740 245H792" stroke="#0F172A" stroke-width="6" stroke-linecap="round"/>
  <path d="M780 229L812 245L780 261" fill="none" stroke="#0F172A" stroke-width="6" stroke-linecap="round" stroke-linejoin="round"/>

  <path d="M740 390H792" stroke="#0F172A" stroke-width="6" stroke-linecap="round"/>
  <path d="M780 374L812 390L780 406" fill="none" stroke="#0F172A" stroke-width="6" stroke-linecap="round" stroke-linejoin="round"/>

  <defs>
    <linearGradient id="bg" x1="600" y1="30" x2="600" y2="590" gradientUnits="userSpaceOnUse">
      <stop stop-color="#F8FAFC"/>
      <stop offset="1" stop-color="#F1F5F9"/>
    </linearGradient>
  </defs>
</svg>
